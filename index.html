<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Peter Johnson | Ayadee Foundation — Education & Advisory</title>

  <meta name="description" content="High-stakes advisory and education at the intersection of frontier AI, DAO governance, and systemic change." />
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #C4A97D;
      --dark: #111827;
      --text: #374151;
      --light: #F8F9FB;
      --white: #FFFFFF;
      --body-font-size: 1.05rem;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Source Sans 3', sans-serif;
      background: var(--light);
      color: var(--dark);
      font-size: var(--body-font-size);
      line-height: 1.7;
    }

    /* FIX: Bold text is never larger than surrounding text */
    strong, b {
      font-weight: 700;
      font-size: inherit; 
      line-height: inherit;
    }

    a { color: var(--primary); text-decoration: none; transition: 0.3s; }
    a:hover { opacity: 0.8; }

    /* NAVIGATION */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 70px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #E5E7EB;
      z-index: 1000;
    }

    .nav-logo { 
      font-family: 'Playfair Display', serif; 
      font-weight: 700; 
      font-size: 1.1rem; 
      display: flex; 
      align-items: center; 
    }

    .nav-links { display: flex; gap: 20px; align-items: center; }
    .nav-links a { color: var(--text); font-size: 0.9rem; font-weight: 600; }

    .btn {
      padding: 12px 24px;
      font-weight: 700;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      display: inline-block;
      text-align: center;
      font-size: 0.95rem;
    }

    .btn-primary { background: var(--primary); color: var(--dark) !important; }
    .btn-outline { border: 2px solid var(--primary); color: var(--dark); }

    /* SECTIONS */
    .s { 
      padding: 100px 24px; 
      scroll-margin-top: 80px; 
    }
    .s-white { background: var(--white); }
    .section-narrow { max-width: 1000px; margin: 0 auto; }

    .s-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 4vw, 2.4rem);
      margin-bottom: 16px;
    }
    .s-subtitle { color: var(--primary); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; font-size: 0.85rem; margin-bottom: 8px; display: block; }

    /* HERO */
    .hero {
      min-height: 80vh;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      text-align: center;
      padding: 140px 24px 60px;
      background: var(--white);
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 5vw, 3.8rem);
      line-height: 1.1;
      margin-bottom: 20px;
      max-width: 950px;
    }

    .hero-sub {
      font-size: 1.2rem;
      color: var(--text);
      max-width: 780px;
      margin-bottom: 32px;
    }

    /* LOGO BAR */
    .logos {
      padding: 50px 24px;
      background: white;
      text-align: center;
      border-top: 1px solid #EEE;
    }
    .logos-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 35px;
      opacity: 0.65;
      filter: grayscale(100%);
      margin-top: 20px;
    }
    .logo-item { font-weight: 700; color: #777; font-size: 0.8rem; letter-spacing: 1px; }

    /* LAYOUT HELPERS */
    .grid-2 { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 60px; align-items: start; }

    /* Fix bullet point alignment */
    ul { list-style: none; padding: 0; margin: 0; }
    li {
      position: relative;
      padding-left: 22px;
      margin-bottom: 12px;
      font-size: var(--body-font-size);
    }
    li::before {
      content: "•";
      color: var(--primary);
      position: absolute;
      left: 0;
      font-weight: 800;
    }

    .card {
      border: 1px solid #E5E7EB;
      border-radius: 6px;
      padding: 28px;
      background: var(--white);
      margin-bottom: 20px;
      transition: 0.3s;
    }
    .card:hover { border-color: var(--primary); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    
    .card-header { 
      font-family: 'Playfair Display', serif; 
      font-size: 1.25rem; 
      font-weight: 700;
      display: block; 
      margin-bottom: 10px; 
    }

    .skills-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 24px;
    }

    form input, form select, form textarea {
      width: 100%;
      padding: 14px;
      border: 1px solid #DDD;
      border-radius: 4px;
      font-family: inherit;
      font-size: 1rem;
      margin-bottom: 16px;
    }

    .footer { text-align: center; padding: 60px; color: #6B7280; border-top: 1px solid #EEE; background: var(--white); font-size: 0.9rem; }

    @media (max-width: 768px) {
      .grid-2 { grid-template-columns: 1fr; }
      .nav-links { display: none; }
      .skills-list { grid-template-columns: 1fr; }
    }
  </style>
</head>

        <polygon points="16.24 7.76 14.12 14.12 7.76 16.2
