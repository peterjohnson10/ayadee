    :root {
      --primary: #C4A97D;
      --dark: #111827;
      --text: #374151;
      --light: #F8F9FB;
      --white: #FFFFFF;
      --body-size: 1.05rem;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Source Sans 3', sans-serif;
      background: var(--light);
      color: var(--dark);
      font-size: var(--body-size);
      line-height: 1.7;
    }

    /* FIX: Standardizes bold text to match surrounding font size exactly */
    strong, b {
      font-weight: 700;
      font-size: inherit; 
      line-height: inherit;
    }

    a { color: var(--primary); text-decoration: none; transition: 0.3s; }
    a:hover { opacity: 0.8; }

    /* NAVIGATION */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 70px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #E5E7EB;
      z-index: 1000;
    }

    .nav-logo { 
        font-family: 'Playfair Display', serif; 
        font-weight: 700; 
        font-size: 1.1rem; 
        display: flex; 
        align-items: center; 
        color: var(--dark);
    }

    .nav-links { display: flex; gap: 20px; align-items: center; }
    .nav-links a { color: var(--text); font-size: 0.9rem; font-weight: 600; }

    .btn {
      padding: 12px 24px;
      font-weight: 700;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      display: inline-block;
      text-align: center;
      font-size: 0.95rem;
    }

    .btn-primary { background: var(--primary); color: var(--dark) !important; }
    .btn-outline { border: 2px solid var(--primary); color: var(--dark); }

    /* SECTIONS */
    .s { padding: 100px 24px; scroll-margin-top: 80px; }
    .s-white { background: var(--white); }
    .section-narrow { max-width: 1000px; margin: 0 auto; }

    .s-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 4vw, 2.4rem);
      margin-bottom: 16px;
    }
    .s-subtitle { color: var(--primary); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; font-size: 0.85rem; margin-bottom: 8px; display: block; }

    /* HERO */
    .hero {
      min-height: 80vh;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      text-align: center;
      padding: 140px 24px 60px;
      background: var(--white);
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 5vw, 3.8rem);
      line-height: 1.1;
      margin-bottom: 20px;
      max-width: 950px;
    }

    .hero-sub {
      font-size: 1.2rem;
      color: var(--text);
      max-width: 780px;
      margin-bottom: 32px;
    }

    /* LOGOS bar */
    .logos {
      padding: 50px 24px;
      background: white;
      text-align: center;
      border-top: 1px solid #EEE;
    }
    .logos-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 35px;
      opacity: 0.65;
      filter: grayscale(100%);
      margin-top: 20px;
    }
    .logo-item { font-weight: 700; color: #777; font-size: 0.8rem; letter-spacing: 1px; }
