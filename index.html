  <style>
    :root {
      --primary: #C4A97D;
      --dark: #111827;
      --text: #374151;
      --light: #F8F9FB;
      --white: #FFFFFF;
      --body-size: 1.05rem;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; overflow-x: hidden; }
    body {
      font-family: 'Source Sans 3', sans-serif;
      background: var(--light);
      color: var(--dark);
      font-size: var(--body-size);
      line-height: 1.7;
      overflow-x: hidden;
    }

    /* Fixed bold text size to match surrounding font size exactly */
    strong, b { font-weight: 700; font-size: inherit; line-height: inherit; }
    a { color: var(--primary); text-decoration: none; transition: 0.3s; }
    a:hover { opacity: 0.8; }

    /* NAVIGATION */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 70px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px;
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #E5E7EB;
      z-index: 2000;
    }

    .nav-logo { 
      font-family: 'Playfair Display', serif; 
      font-weight: 700; 
      font-size: 1.05rem; 
      display: flex; 
      align-items: center; 
      color: var(--dark);
    }

    .nav-links { display: flex; gap: 20px; align-items: center; }
    .nav-links a { color: var(--text); font-size: 0.9rem; font-weight: 600; }

    .menu-toggle { display: none; cursor: pointer; flex-direction: column; gap: 5px; z-index: 2001; }
    .menu-toggle span { width: 25px; height: 2px; background: var(--dark); transition: 0.3s; }

    @media (max-width: 950px) {
      .nav { padding: 0 20px; }
      .menu-toggle { display: flex; }
      .nav-links {
        position: fixed;
        top: 0; right: -100%;
        width: 85%; height: 100vh;
        background: var(--white);
        flex-direction: column;
        justify-content: center;
        transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: -10px 0 30px rgba(0,0,0,0.1);
      }
      .nav-links.active { right: 0; }
      .nav-links a { font-size: 1.4rem; padding: 15px 0; }
    }

    /* BUTTONS */
    .btn {
      padding: 14px 28px;
      font-weight: 700;
      border-radius: 4px;
      cursor: pointer;
      display: inline-block;
      text-align: center;
      font-size: 1rem;
      border: none;
    }
    .btn-primary { background: var(--primary); color: var(--dark) !important; }
    .btn-outline { border: 2px solid var(--primary); color: var(--dark); }

    /* SECTIONS */
    .s { padding: 100px 24px; scroll-margin-top: 75px; }
    .s-white { background: var(--white); }
    .section-narrow { max-width: 1000px; margin: 0 auto; }

    .s-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      margin-bottom: 20px;
      line-height: 1.2;
    }
    .s-subtitle { color: var(--primary); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; font-size: 0.85rem; margin-bottom: 10px; display: block; }

    /* HERO */
    .hero {
      min-height: 85vh;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      text-align: center;
      padding: 120px 20px 60px;
      background: var(--white);
    }
    .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.4rem, 5vw, 3.8rem); line-height: 1.1; margin-bottom: 20px; max-width: 950px; }
    .hero-sub { font-size: 1.15rem; color: var(--text); max-width: 700px; margin-bottom: 35px; }

    /* LOGO BAR */
    .logos { padding: 40px 20px; background: white; border-top: 1px solid #EEE; text-align: center; }
    .logos-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; opacity: 0.6; filter: grayscale(100%); margin-top: 20px; }
    .logo-item { font-weight: 700; font-size: 0.8rem; letter-spacing: 1px; }

    /* GRID & CARDS */
    .grid-2 { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 40px; align-items: start; }
    .card { border: 1px solid #E5E7EB; border-radius: 6px; padding: 25px; background: var(--white); margin-bottom: 20px; transition: 0.3s; }
    .card:hover { border-color: var(--primary); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .card-header { font-family: 'Playfair Display', serif; font-size: 1.25rem; font-weight: 700; margin-bottom: 10px; display: block; }
    .card-header a { color: var(--dark); }

    ul { list-style: none; }
    li { position: relative; padding-left: 22px; margin-bottom: 12px; }
    li::before { content: "•"; color: var(--primary); position: absolute; left: 0; font-weight: 800; }
